# Diariz — full stack for Milestone 1 (web UI + API + worker + infra).
# Run from this directory:  docker compose up --build
# Secrets/config come from ./.env (copy from .env.example).

# Project/stack name (Docker requires lowercase, so this shows as "diariz"
# instead of defaulting to the "deploy" directory name).
name: diariz

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: diariz
      POSTGRES_USER: diariz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diariz}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diariz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9002:9000"   # S3 API   (host 9002 -> container 9000)
      - "9003:9001"   # console   (host 9003 -> container 9001)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: src/Diariz.Api/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=diariz;Username=diariz;Password=${POSTGRES_PASSWORD:-diariz}"
      Jwt__Key: ${JWT_KEY}
      # The API streams audio to the browser itself (same-origin), so MinIO never needs to be
      # browser-reachable — only the API reaches it at minio:9000.
      Storage__Endpoint: "http://minio:9000"
      Storage__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JobQueue__RedisConnection: "redis:6379"
      Worker__CallbackSecret: ${CALLBACK_SECRET}
      Summarization__ApiBase: ${SUMMARY_API_BASE:-}
      Summarization__ApiKey: ${SUMMARY_API_KEY:-}
      Summarization__Model: ${SUMMARY_MODEL:-gpt-4o-mini}
      # Reasoning models: send reasoning_effort on LLM requests. Off by default; per-user overridable in Settings.
      Summarization__ReasoningEnabled: ${SUMMARY_REASONING_ENABLED:-false}
      Summarization__ReasoningEffort: ${SUMMARY_REASONING_EFFORT:-medium}
      # Semantic search (RAG) embeddings. Empty ApiBase reuses the owner's summarisation endpoint; empty
      # everywhere keeps search lexical. Model + dimension are server-pinned (must match the vector(768) column).
      Embedding__ApiBase: ${EMBED_API_BASE:-}
      Embedding__ApiKey: ${EMBED_API_KEY:-}
      Embedding__Model: ${EMBED_MODEL:-nomic-embed-text}
      Embedding__Dimension: ${EMBED_DIMENSION:-768}
      # nomic task prefixes (improve retrieval); set both empty for models that don't use them (e.g. OpenAI).
      Embedding__QueryPrefix: ${EMBED_QUERY_PREFIX:-search_query: }
      Embedding__DocumentPrefix: ${EMBED_DOCUMENT_PREFIX:-search_document: }
      # Speaker identification (voiceprints). Threshold is the max cosine distance for an
      # auto-match — conservative by default; tune per your audio (lower = stricter).
      Identification__Enabled: ${IDENTIFICATION_ENABLED:-true}
      Identification__Threshold: ${IDENTIFICATION_THRESHOLD:-0.4}
      Chat__ContextLength: ${CHAT_CONTEXT_LENGTH:-131072}
      Chat__ToolsEnabled: ${CHAT_TOOLS_ENABLED:-false}
      Chat__DisabledTools: ${CHAT_DISABLED_TOOLS:-}
      # Uploaded-audio limits (the "Upload" button). AllowAac=false drops M4A/AAC for commercial caution.
      Uploads__MaxBytes: ${UPLOAD_MAX_BYTES:-524288000}
      Uploads__AllowAac: ${UPLOAD_ALLOW_AAC:-true}
      # Persist the Data Protection keyring so encrypted per-user API keys survive container recreates.
      DataProtection__KeysPath: /keys
      Seed__Email: ${SEED_EMAIL}
      Seed__Password: ${SEED_PASSWORD}
      Seed__FullName: ${SEED_FULL_NAME:-Platform Administrator}
      App__PublicUrl: ${APP_PUBLIC_URL:-http://localhost:8081}
      # OAuth 2.1 sign-in for the claude.ai web MCP connector. On by default; the token issuer is App__PublicUrl
      # (must be the public HTTPS origin in production) and the signing/encryption keys persist to the /keys
      # volume above. A client may only register a redirect_uri on this host allowlist (defaults cover
      # claude.ai/claude.com + loopback). Set McpOAuth__Enabled=false to turn the OAuth server off entirely.
      McpOAuth__Enabled: ${MCP_OAUTH_ENABLED:-true}
      # Google sign-in (optional). Leave the client id/secret empty to disable it (the login page then hides
      # the Google button). RedirectUri is derived from App__PublicUrl when left blank.
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID:-}
      GoogleAuth__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      GoogleAuth__RedirectUri: ${GOOGLE_REDIRECT_URI:-}
      Email__SmtpHost: ${SMTP_HOST:-}
      Email__SmtpPort: ${SMTP_PORT:-587}
      Email__User: ${SMTP_USER:-}
      Email__Password: ${SMTP_PASSWORD:-}
      Email__From: ${SMTP_FROM:-}
      Email__UseStartTls: ${SMTP_USE_STARTTLS:-true}
      Cors__Origins__0: "http://localhost:5173"
      Cors__Origins__1: "http://localhost:8081"
    volumes:
      - apikeys:/keys
    ports:
      - "8080:8080"

  # Static web UI served by nginx, proxying /api and /hubs to the API container.
  web:
    build:
      context: ../apps/web
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-}
    depends_on:
      api:
        condition: service_started
    ports:
      - "8081:80"   # open the app at http://localhost:8081

  worker:
    build:
      context: ../src/Diariz.Worker
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_started }
      api: { condition: service_started }
    environment:
      REDIS_URL: "redis://redis:6379/0"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: "recordings"
      API_BASE_URL: "http://api:8080"
      CALLBACK_SECRET: ${CALLBACK_SECRET}
      HF_TOKEN: ${HF_TOKEN}
      DEVICE: ${WORKER_DEVICE:-cuda}
      COMPUTE_TYPE: ${WORKER_COMPUTE_TYPE:-float16}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      # WhisperX transcription batch size. Lower it (8/4) to cut peak VRAM on smaller GPUs.
      BATCH_SIZE: ${BATCH_SIZE:-16}
      # Reject audio longer than this many seconds (0 = unlimited). 14400 = 4 h.
      MAX_AUDIO_SECONDS: ${MAX_AUDIO_SECONDS:-14400}
      # Per-speaker ECAPA voiceprint embeddings (for identification). Set to 0 to disable.
      ENABLE_SPEAKER_EMBEDDINGS: ${ENABLE_SPEAKER_EMBEDDINGS:-1}
    volumes:
      # Persist downloaded models (whisper large-v3, wav2vec2 align, pyannote) across
      # container recreates so a rebuild doesn't re-download ~4GB. Covers both the torch
      # hub cache (/root/.cache/torch) and the HF hub cache (/root/.cache/huggingface).
      - workercache:/root/.cache
    # GPU access — requires the NVIDIA Container Toolkit on the host.
    # For CPU-only, comment this out and set WORKER_DEVICE=cpu, WORKER_COMPUTE_TYPE=int8.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pgdata:
  miniodata:
  workercache:
  apikeys:

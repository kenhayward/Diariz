# Dependabot version-update configuration.
#
# This file only drives scheduled *version* updates. Dependabot *alerts* and *security updates* (which
# react to the GitHub Advisory Database) are enabled separately under Settings -> Code security, not here.
version: 2
updates:
  # Web SPA (React/Vite/Tailwind).
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    groups:
      web-deps:
        patterns: ["*"]

  # Electron desktop shell.
  - package-ecosystem: "npm"
    directory: "/apps/desktop"
    schedule:
      interval: "weekly"
    groups:
      desktop-deps:
        patterns: ["*"]

  # .NET API + Domain. packages.lock.json (see Directory.Build.props) lets Dependabot bump transitives too.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python transcription worker. The GPU/compat stack is deliberately pinned (see CLAUDE.md) — let
  # Dependabot watch for security advisories but do NOT open version-bump PRs for those packages, or it
  # will keep proposing breaking upgrades.
  - package-ecosystem: "pip"
    directory: "/src/Diariz.Worker"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "whisperx"
      - dependency-name: "transformers"
      - dependency-name: "huggingface_hub"
      - dependency-name: "ctranslate2"

  # The GitHub Actions used by the CI/desktop-release workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

name: CodeQL

# Advanced CodeQL setup (replaces GitHub's default setup, which cannot build C#).
# Covers C# (with a real .NET build so the API is analysed properly), plus the buildless
# languages. If default setup is still enabled, disable it (Settings -> Code security ->
# Code scanning -> switch to Advanced) or this workflow will error.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v7

      # Only the C# leg needs the SDK; the others are analysed buildless.
      - name: Set up .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Manual build for C# (autobuild doesn't reliably find the .slnx solution).
      - name: Build (C#)
        if: matrix.language == 'csharp'
        run: dotnet build Diariz.slnx -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

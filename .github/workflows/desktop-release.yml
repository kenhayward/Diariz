name: Desktop release

# Builds the Windows desktop installer and publishes it to this repo's GitHub Releases.
# Trigger by pushing a version tag (e.g. v0.10.0) that matches apps/desktop/package.json.
#
# Self-hosted feed instead of GitHub: a fork can host its own update feed by building with
# `DIARIZ_PUBLISH=generic DIARIZ_UPDATE_URL=https://your-server/updates/ npm run dist` and
# uploading apps/desktop/release/* (incl. latest.yml) to that URL — adjust the publish step below.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/upload the GitHub Release

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          # Node 22: the test runner's glob support (`node --test "src/**/*.test.js"`)
          # only exists on Node >= 21; Node 20 treats the pattern as a literal path.
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm test
      # electron-builder's GitHub publisher can race while uploading multiple assets and create TWO
      # releases for the same tag, splitting latest.yml / .exe / .blockmap across them - which breaks
      # electron-updater's asset resolution so "Check for updates" finds nothing. Pre-creating the
      # release means the publisher finds an existing one and uploads every asset to it, never creating
      # duplicates. (GitHub path only; a fork on a generic feed doesn't use GitHub Releases.)
      - name: Ensure a single GitHub release exists for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag \
              --title "$GITHUB_REF_NAME" --notes "Diariz $GITHUB_REF_NAME"
          fi
      - name: Build + publish installer (GitHub Releases)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

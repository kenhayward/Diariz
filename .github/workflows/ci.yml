name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One run per ref; cancel superseded runs so stale pushes don't keep burning runner time.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dotnet-unit:
    name: .NET unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No global.json, so pin the SDK explicitly. setup-dotnet installs into the hosted
      # runner's tool cache — the self-hosted "can't write to C:\Program Files" hack is gone.
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Unit tests
        run: dotnet test tests/Diariz.Api.Tests/Diariz.Api.Tests.csproj -c Release

  dotnet-integration:
    name: .NET integration (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      # Spins up real Postgres/pgvector, Redis, and MinIO via Testcontainers — Docker is
      # preinstalled on ubuntu-latest, so no Docker-host workaround is needed.
      - name: Integration tests
        run: dotnet test tests/Diariz.Api.IntegrationTests/Diariz.Api.IntegrationTests.csproj -c Release

  web:
    name: Web (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Test
        working-directory: apps/web
        run: npm test

  locale-gate:
    name: Locale single-language gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need history to diff the branch against its base
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # A translation-only PR may touch at most one non-English locale folder (core PRs are exempt).
      # Runs from the repo root so `git diff` finds the working tree.
      - name: Check one non-en locale per translation PR
        run: node apps/web/scripts/check-single-locale.mjs ${{ github.event.pull_request.base.sha }}

  n8n-node:
    name: n8n community node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: integrations/n8n-nodes-diariz/package-lock.json
      # The node's long tail of operations is generated from the published OpenAPI document. This test
      # rewrites the committed snapshot and fails when the API's public surface has moved, so an endpoint
      # cannot change under the node unnoticed. It needs no database or containers.
      - name: OpenAPI snapshot is current
        run: dotnet test tests/Diariz.Api.Tests/Diariz.Api.Tests.csproj -c Release --filter "FullyQualifiedName~OpenApiSnapshotTests"
      - name: Install
        working-directory: integrations/n8n-nodes-diariz
        run: npm ci
      - name: Regenerate operations
        working-directory: integrations/n8n-nodes-diariz
        run: npm run generate
      - name: Test
        working-directory: integrations/n8n-nodes-diariz
        run: npm test
      - name: Lint
        working-directory: integrations/n8n-nodes-diariz
        run: npm run lint
      - name: Build
        working-directory: integrations/n8n-nodes-diariz
        run: npm run build
      # Catches the case where the snapshot was current but the generated module was never regenerated
      # from it, which would leave the node advertising operations the API no longer has.
      - name: Generated output is committed
        run: git diff --exit-code -- integrations/n8n-nodes-diariz

  worker:
    name: Worker (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      # whisperx/torch are stubbed in the tests, so only the lightweight deps are installed
      # (no GPU needed).
      - name: Install test deps
        working-directory: src/Diariz.Worker
        run: python -m pip install -r requirements-test.txt
      - name: Test
        working-directory: src/Diariz.Worker
        run: python -m pytest

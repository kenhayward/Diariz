server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large audio uploads (matches the API's 1 GiB RequestSizeLimit). nginx defaults to
    # 1 MB, which otherwise rejects recordings over ~1 MB with 413 before they reach the API.
    client_max_body_size 1024m;

    # REST API — forwarded unchanged to the API container.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub — needs WebSocket upgrade and long-lived connections.
    location /hubs/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # MCP server (Streamable HTTP) — forwarded to the API. Responses stream as text/event-stream,
    # so response buffering must be off or the SSE stream stalls (no WebSocket upgrade needed).
    # X-Forwarded-Proto lets the MCP link-rewriter emit correct absolute https:// deep-links.
    location /mcp {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # OAuth 2.1 authorization server (for the claude.ai web MCP connector): the OpenIddict endpoints
    # (/connect/authorize, /connect/token) + the hand-rolled DCR endpoint (/connect/register), and the
    # discovery/metadata documents (/.well-known/openid-configuration, /.well-known/oauth-authorization-server,
    # /.well-known/oauth-protected-resource). These are served by the API and MUST be forwarded to it - without
    # this, an OAuth client fetching them would get the SPA index.html instead. X-Forwarded-Proto lets OpenIddict
    # see the public https scheme (issuer, token audience, cookie Secure flag). NOTE: /oauth/consent is a SPA
    # route and is deliberately NOT proxied here - it stays on the client-side fallback below.
    location /connect/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /.well-known/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
